spring.application.name=SkillPulse-Backend
server.port=8080

# Database Configuration (H2 in memory)
spring.datasource.url=jdbc:h2:mem:skillpulsedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration (In production, inject this securely)
skillpulse.app.jwtSecret=eHlwYXNzX3NlY3JldF9LZXlfYWJjMTIzXzQ1NnpuZXhjb21wbGV4X2tleTM0MjM0MjM0c2Zhc2Q=
skillpulse.app.jwtExpirationMs=86400000
